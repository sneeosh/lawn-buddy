name = "lawn-buddy"
main = "src/index.ts"
compatibility_date = "2024-04-25"
type = "service"

# Cloudflare KV bindings (for lawn care data)
# [[kv_namespaces]]
# binding = "LAWN_BUDDY_KV"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# CORS configuration
[env.production]
routes = [
  {pattern = "lawn-buddy.workers.dev", zone_name = "workers.dev"}
]

[env.development]
routes = []
